spring.application.name=audit
server.port=8080

# Fichier local (non versionné) pour les accès BDD — voir application-local.properties.example
spring.config.import=optional:classpath:application-local.properties

audit.pool-size=12
audit.parallel-threads=12
audit.connection-timeout-ms=5000
audit.max-orphan-details-per-table=500
audit.in-clause-batch-size=1000

# Module repo npm (désactivé par défaut — voir application-local.properties.example)
repo.enabled=false
